name: Tag release

# Mobile-friendly: run this from Actions → "Tag release" → "Run workflow",
# type a version, hit go. Creates and pushes the git tag on top of main,
# then manually dispatches the Release workflow against that tag.
#
# Why dispatch explicitly? GitHub's GITHUB_TOKEN is intentionally prevented
# from triggering other workflows via `push` events to avoid recursion — so
# pushing the tag alone wouldn't kick off `release.yml`. workflow_dispatch
# is the documented exception: it DOES fire when the GITHUB_TOKEN calls it.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to create (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write
  actions: write   # needed to POST /actions/workflows/release.yml/dispatches

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Validate and push tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::invalid version '$VERSION' (expected vX.Y.Z or vX.Y.Z-suffix)"
            exit 1
          fi
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "::error::tag $VERSION already exists"
            exit 1
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin "$VERSION"

      - name: Trigger Release workflow against the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          echo "::notice::dispatching release.yml for $VERSION"
          # Pass the tag as input so release.yml checks out refs/tags/<tag>
          # directly, rather than relying on --ref which the Actions UI can
          # override. --ref is still main here (where release.yml lives).
          gh workflow run release.yml --ref main -f "tag=$VERSION"

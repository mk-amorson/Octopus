name: Build image

# Builds apps/web as a multi-arch Docker image and pushes it to GitHub
# Container Registry on every v* tag. The image is the only artifact
# consumers of this repo ever see — the public installer pulls it by
# tag at install time, which is why this repo can stay private.
#
# After the first successful push, make the package public at:
#   github.com/users/mk-amorson/packages/container/octopus-web/settings
# (Package visibility → Change to Public). Docker pulls from public
# packages don't require auth.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g. v0.1.0). Leave blank to use commit SHA."
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercase is required by registries. `owner` on GitHub repos
          # is already lowercase, but keep the explicit expression so this
          # still works if the repo is transferred under a Mixed-Case org.
          images: ghcr.io/${{ github.repository_owner }}/octopus-web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' && inputs.tag == '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # basePath is baked into the image at build time. The public
          # installer assumes /octopus — change here only if you also ship
          # alternative images for other subpaths.
          build-args: |
            OCTOPUS_BASE_PATH=/octopus
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

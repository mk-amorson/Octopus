name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -e
          missing=()
          [ -n "$DEPLOY_HOST" ] || missing+=("DEPLOY_HOST")
          [ -n "$DEPLOY_USER" ] || missing+=("DEPLOY_USER")
          if [ -z "$DEPLOY_PASSWORD" ] && [ -z "$DEPLOY_SSH_KEY" ]; then
            missing+=("DEPLOY_PASSWORD or DEPLOY_SSH_KEY")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing required secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Ensure remote deploy path exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          command_timeout: 2m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/opt/octopus' }}"
            mkdir -p "$DEPLOY_PATH"

      - name: Copy repository to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          source: "."
          target: ${{ vars.DEPLOY_PATH || '/opt/octopus' }}
          strip_components: 0
          overwrite: true
          rm: false

      - name: Run server-side deploy hook
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          port: ${{ vars.DEPLOY_PORT || 22 }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          passphrase: ${{ secrets.DEPLOY_SSH_KEY_PASSPHRASE }}
          command_timeout: 10m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/opt/octopus' }}"
            cd "$DEPLOY_PATH"
            if [ -x scripts/server-deploy.sh ]; then
              ./scripts/server-deploy.sh
            else
              echo "scripts/server-deploy.sh not found or not executable; skipping hook."
            fi

name: CI

# Runs static checks on every PR and every push to main. Intentionally
# split into two tight jobs — the web app and the Go installer have no
# dependency on each other, so they should fail or succeed independently.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (lint / typecheck / build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20.11.0"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  installer:
    name: Installer (vet / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: installer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: installer/go.mod
          cache-dependency-path: installer/go.sum

      - run: go vet ./...
      - run: go build ./...

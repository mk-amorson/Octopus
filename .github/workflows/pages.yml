name: Pages

# Publishes docs/pages/ as the GitHub Pages site that serves the install
# bootstrap shims and the landing page.

on:
  push:
    branches: [main]
    paths:
      - "docs/pages/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/pages

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
